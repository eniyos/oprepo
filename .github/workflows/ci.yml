name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: oprepo
          POSTGRES_PASSWORD: oprepo
          POSTGRES_DB: oprepo
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      # - name: Test
      #   run: pnpm test
      #   env:
      #     DATABASE_URL: postgresql://oprepo:oprepo@localhost:5432/oprepo

  ml-service:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/ml

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: services/ml/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (flake8)
        run: pip install flake8 && flake8 src/ --max-line-length=100

      - name: Import check
        run: python -c "from src.app import app; print('ML service imports OK')"
