version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    ports:
      - '4000:4000'
    environment:
      - DATABASE_URL=postgresql://oprepo:oprepo@db:5432/oprepo
      - REDIS_URL=redis://redis:6379
      - ML_SERVICE_URL=http://ml:8000
      - NODE_ENV=development
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      ml:
        condition: service_started

  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    ports:
      - '3000:3000'
    environment:
      - NEXT_PUBLIC_API_URL=http://api:4000
      - NODE_ENV=development
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - api

  ml:
    build:
      context: services/ml
      dockerfile: ../../docker/ml/Dockerfile
    ports:
      - '8000:8000'
    environment:
      - MODEL_NAME=all-MiniLM-L6-v2
    volumes:
      - ./services/ml:/app
    deploy:
      resources:
        reservations:
          memory: 512M

  db:
    image: pgvector/pgvector:pg16
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: oprepo
      POSTGRES_PASSWORD: oprepo
      POSTGRES_DB: oprepo
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U oprepo']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
